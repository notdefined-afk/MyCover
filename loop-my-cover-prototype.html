<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Loop — My Cover</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const T = {
  teal: "#2BB5A0", tealDk: "#1E9B88", tealLt: "#E6F7F5", tealPale: "#F2FAFA",
  coral: "#F07060", coralLt: "#FEF2F0",
  amber: "#F59E0B", amberLt: "#FFFBEB", amberBdr: "#FDE68A",
  bg: "#F5F7F9", white: "#FFFFFF",
  text: "#1A1A2E", text2: "#4A5568", muted: "#9AA5B4",
  bdr: "#E2E8F0", bdr2: "#EDF2F7",
};

const SYSTEM_PROMPT = `You are the Loop Health Policy Assistant for Indian employees.

Policy: Meesho Technologies Group Health — ₹5,00,000 sum insured, self + spouse + 2 dependents.
Covered: hospitalisation (min 24hrs), daycare procedures, pre/post hospitalisation (30/60 days), maternity (9-month waiting period, up to ₹50,000), ambulance, room rent (1% of SI/day).
NOT covered: routine dental, spectacles, OPD pharmacy, cosmetic procedures.

CRITICAL: Detect the intent of the question and respond in the correct format below.

--- FORMAT A: COVERAGE QUESTION (is X covered, does policy cover X, coverage for X) ---
INTENT: COVERAGE
STATUS: COVERED | NOT_COVERED | PARTIAL
AMOUNT: [e.g. Up to ₹5,00,000 or Sub-limit: ₹50,000]
CONDITIONS:
- [condition: value]
- [condition: value]
HOSPITALS:
- Apollo Hospitals — Koramangala, 3 km — Cashless
- Manipal Hospital — Whitefield, 5 km — Cashless
- Fortis Hospital — Bannerghatta, 7 km — Reimbursement
STEPS:
1. [step]
2. [step]
CHIPS: documents,preauth

--- FORMAT B: PROCESS QUESTION (how does X work, what do I do for X, steps for X) ---
INTENT: PROCESS
CONFIRMATION: [one line: yes/no this is/isn't covered, e.g. "Fracture treatment is covered under your policy"]
STEPS:
1. [step]
2. [step]
3. [step]
TIMELINE: [e.g. Cashless: approved within 4-6 hours. Reimbursement: settled within 15-30 days]
CHIPS: documents,cashless

--- FORMAT C: DOCUMENT QUESTION (what documents, what to carry, paperwork) ---
INTENT: DOCUMENTS
CASHLESS:
- [document]
- [document]
REIMBURSEMENT:
- [document]
- [document]
CHIPS: none

--- FORMAT D: NOT COVERED ---
INTENT: NOT_COVERED
REASON: [plain factual statement, no drama]
EXCEPTION: [only if there is a genuine exception, e.g. accidental dental. Otherwise leave blank]
CHIPS: none

RULES:
- Detect intent accurately. "How does reimbursement work for fracture" = PROCESS not COVERAGE
- CONDITIONS lines must be "Label: Value" format e.g. "Minimum stay: 24 hours"
- Never use markdown bold (**text**) anywhere
- Plain English only, no insurance jargon
- For PARTIAL coverage use FORMAT A with STATUS: PARTIAL and show what is and isn't covered in CONDITIONS
- Always include CHIPS line`;

function parse(txt) {
  const keys = ["INTENT","STATUS","AMOUNT","CONDITIONS","HOSPITALS","STEPS","CHIPS",
    "CONFIRMATION","TIMELINE","CASHLESS","REIMBURSEMENT","REASON","EXCEPTION"];
  const p = {}; let ck = null, cl = [];
  for (const line of txt.split("\n")) {
    const ci = line.indexOf(":");
    const k = line.substring(0, ci).trim();
    if (ci > 0 && keys.includes(k)) {
      if (ck) p[ck] = cl.join("\n").trim();
      ck = k; cl = [line.substring(ci + 1).trim()];
    } else if (ck) cl.push(line);
  }
  if (ck) p[ck] = cl.join("\n").trim();
  return p;
}

function parseList(str) {
  return (str || "").split("\n").map(l => l.replace(/^[-•*\d.]\s*/, "").trim()).filter(Boolean);
}

function parseConditions(str) {
  return parseList(str).map(l => {
    const ci = l.indexOf(":");
    return ci > 0 ? { label: l.substring(0, ci).trim(), val: l.substring(ci + 1).trim() } : { label: "", val: l };
  });
}

function parseHospitals(str) {
  return parseList(str).filter(l => !l.toLowerCase().includes("sample")).map((l, i) => {
    const pts = l.split("—").map(s => s.trim());
    return { n: i + 1, name: pts[0] || l, meta: pts[1] || "", cash: l.toLowerCase().includes("cashless") };
  });
}

function getChips(chipStr, intent) {
  const chipMap = {
    documents: "What documents do I need?",
    preauth: "Is pre-auth required?",
    cashless: "Nearest cashless hospital?",
    accident: "What if it was due to an accident?",
    outofpocket: "What do I pay out of pocket?",
  };
  if (!chipStr || chipStr.trim() === "none") return [];
  return chipStr.split(",").map(c => chipMap[c.trim()]).filter(Boolean);
}

// ── VERDICT BADGE ──
function Verdict({ status, amount }) {
  const cfg = {
    COVERED: { bg: "#D1FAE5", color: "#065F46", label: "Covered" },
    PARTIAL: { bg: "#FEF3C7", color: "#92400E", label: "Partially Covered" },
    NOT_COVERED: { bg: "#FFFBEB", color: "#92400E", label: "Not Covered" },
  }[status] || { bg: T.bdr, color: T.text2, label: status };

  return (
    <div style={{ marginBottom: 12 }}>
      <div style={{ display: "inline-flex", alignItems: "center", gap: 8, background: cfg.bg, borderRadius: 10, padding: "8px 14px" }}>
        <span style={{ fontSize: 15, fontWeight: 700, color: cfg.color }}>{cfg.label}</span>
        {amount && <span style={{ fontSize: 13, fontWeight: 500, color: cfg.color, opacity: 0.8 }}>· {amount}</span>}
      </div>
    </div>
  );
}

// ── SECTION CARD ──
function Section({ title, children }) {
  return (
    <div style={{ background: T.white, border: `1px solid ${T.bdr}`, borderRadius: 12, overflow: "hidden", marginBottom: 8, maxWidth: "95%" }}>
      <div style={{ padding: "8px 13px", borderBottom: `1px solid ${T.bdr2}`, background: T.bg }}>
        <span style={{ fontSize: 11, fontWeight: 700, color: T.text2, textTransform: "uppercase", letterSpacing: "0.5px" }}>{title}</span>
      </div>
      <div style={{ padding: "10px 13px" }}>{children}</div>
    </div>
  );
}

// ── CONDITION ROWS ──
function CondRows({ items }) {
  return (
    <>
      {items.map((c, i) => (
        <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", padding: "5px 0", borderBottom: i < items.length - 1 ? `1px solid ${T.bdr2}` : "none", gap: 12 }}>
          <span style={{ fontSize: 12, color: T.muted, flexShrink: 0, maxWidth: "45%", textAlign: "left" }}>{c.label}</span>
          <span style={{ fontSize: 12, fontWeight: 500, color: T.text, textAlign: "right" }}>{c.val}</span>
        </div>
      ))}
    </>
  );
}

// ── STEPS LIST ──
function Steps({ items }) {
  return (
    <>
      {items.map((s, i) => (
        <div key={i} style={{ display: "flex", gap: 10, padding: "6px 0", borderBottom: i < items.length - 1 ? `1px solid ${T.bdr2}` : "none", alignItems: "flex-start" }}>
          <div style={{ width: 18, height: 18, background: T.teal, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9, fontWeight: 700, color: "white", flexShrink: 0, marginTop: 1 }}>{i + 1}</div>
          <span style={{ fontSize: 12, color: T.text, lineHeight: 1.55, flex: 1 }}>{s}</span>
        </div>
      ))}
    </>
  );
}

// ── HOSPITAL LIST ──
function Hospitals({ items }) {
  return (
    <>
      {items.map((h, i) => (
        <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 9, padding: "7px 0", borderBottom: i < items.length - 1 ? `1px solid ${T.bdr2}` : "none" }}>
          <div style={{ width: 18, height: 18, background: T.tealLt, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9, fontWeight: 700, color: T.tealDk, flexShrink: 0 }}>{h.n}</div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: T.text }}>{h.name}</div>
            {h.meta && <div style={{ fontSize: 10, color: T.muted, marginTop: 1 }}>{h.meta}</div>}
          </div>
          <span style={{ fontSize: 9, fontWeight: 700, padding: "2px 7px", borderRadius: 8, background: h.cash ? "#D1FAE5" : "#FEF3C7", color: h.cash ? "#065F46" : "#92400E", flexShrink: 0 }}>{h.cash ? "Cashless" : "Reimb."}</span>
        </div>
      ))}
      <div style={{ marginTop: 8, fontSize: 10, color: T.muted, lineHeight: 1.4, paddingTop: 8, borderTop: `1px solid ${T.bdr2}` }}>
        ⚠ Sample data — live network requires TPA API integration
      </div>
    </>
  );
}

// ── CHIP STRIP ──
function ChipStrip({ chips, onSug }) {
  if (!chips || chips.length === 0) return null;
  return (
    <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 6, maxWidth: "95%" }}>
      {chips.map(c => (
        <div key={c} onClick={() => onSug(c)} style={{ background: T.white, border: `1.5px solid ${T.bdr}`, borderRadius: 20, padding: "5px 12px", fontSize: 12, fontWeight: 500, color: T.text, cursor: "pointer", whiteSpace: "nowrap" }}>{c}</div>
      ))}
    </div>
  );
}

// ── STRUCTURED RESPONSE RENDERER ──
function StructuredResp({ text, onSug }) {
  const p = parse(text);
  const intent = (p["INTENT"] || "").trim();
  const chips = getChips(p["CHIPS"], intent);

  // FORMAT A: COVERAGE
  if (intent === "COVERAGE") {
    const status = (p["STATUS"] || "").trim();
    const conds = parseConditions(p["CONDITIONS"]);
    const hosps = parseHospitals(p["HOSPITALS"]);
    const steps = parseList(p["STEPS"]);

    return (
      <div style={{ display: "flex", flexDirection: "column", gap: 2, alignItems: "flex-start", maxWidth: "95%" }}>
        <Verdict status={status} amount={p["AMOUNT"]} />
        {conds.length > 0 && <Section title="Conditions"><CondRows items={conds} /></Section>}
        {hosps.length > 0 && <Section title="Nearby Network Hospitals"><Hospitals items={hosps} /></Section>}
        {steps.length > 0 && <Section title="What to do next"><Steps items={steps} /></Section>}
        <ChipStrip chips={chips} onSug={onSug} />
      </div>
    );
  }

  // FORMAT B: PROCESS
  if (intent === "PROCESS") {
    const steps = parseList(p["STEPS"]);
    return (
      <div style={{ display: "flex", flexDirection: "column", gap: 2, alignItems: "flex-start", maxWidth: "95%" }}>
        {p["CONFIRMATION"] && (
          <div style={{ background: T.tealPale, border: `1px solid ${T.tealLt}`, borderRadius: 10, padding: "9px 13px", marginBottom: 6, maxWidth: "95%" }}>
            <span style={{ fontSize: 13, color: T.tealDk, fontWeight: 500 }}>{p["CONFIRMATION"]}</span>
          </div>
        )}
        {steps.length > 0 && <Section title="Step-by-step process"><Steps items={steps} /></Section>}
        {p["TIMELINE"] && (
          <div style={{ background: T.bg, border: `1px solid ${T.bdr}`, borderRadius: 10, padding: "9px 13px", maxWidth: "95%" }}>
            <div style={{ fontSize: 10, fontWeight: 700, color: T.muted, textTransform: "uppercase", letterSpacing: "0.5px", marginBottom: 4 }}>Timeline</div>
            <div style={{ fontSize: 12, color: T.text2, lineHeight: 1.55 }}>{p["TIMELINE"]}</div>
          </div>
        )}
        <ChipStrip chips={chips} onSug={onSug} />
      </div>
    );
  }

  // FORMAT C: DOCUMENTS
  if (intent === "DOCUMENTS") {
    const cashless = parseList(p["CASHLESS"]);
    const reimb = parseList(p["REIMBURSEMENT"]);
    return (
      <div style={{ display: "flex", flexDirection: "column", gap: 2, alignItems: "flex-start", maxWidth: "95%" }}>
        {cashless.length > 0 && (
          <Section title="For cashless claims">
            {cashless.map((d, i) => (
              <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 8, padding: "5px 0", borderBottom: i < cashless.length - 1 ? `1px solid ${T.bdr2}` : "none" }}>
                <span style={{ color: T.teal, fontWeight: 700, fontSize: 12, flexShrink: 0 }}>✓</span>
                <span style={{ fontSize: 12, color: T.text, lineHeight: 1.45 }}>{d}</span>
              </div>
            ))}
          </Section>
        )}
        {reimb.length > 0 && (
          <Section title="For reimbursement claims">
            {reimb.map((d, i) => (
              <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 8, padding: "5px 0", borderBottom: i < reimb.length - 1 ? `1px solid ${T.bdr2}` : "none" }}>
                <span style={{ color: T.teal, fontWeight: 700, fontSize: 12, flexShrink: 0 }}>✓</span>
                <span style={{ fontSize: 12, color: T.text, lineHeight: 1.45 }}>{d}</span>
              </div>
            ))}
          </Section>
        )}
        <ChipStrip chips={chips} onSug={onSug} />
      </div>
    );
  }

  // FORMAT D: NOT COVERED
  if (intent === "NOT_COVERED") {
    return (
      <div style={{ display: "flex", flexDirection: "column", gap: 6, alignItems: "flex-start", maxWidth: "95%" }}>
        <div style={{ background: T.amberLt, border: `1px solid ${T.amberBdr}`, borderRadius: 12, padding: "13px 15px", maxWidth: "95%" }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: "#78350F", marginBottom: 6 }}>Not covered under your policy</div>
          <div style={{ fontSize: 13, color: "#92400E", lineHeight: 1.6 }}>{p["REASON"]}</div>
          {p["EXCEPTION"] && p["EXCEPTION"].trim() && (
            <div style={{ marginTop: 10, paddingTop: 10, borderTop: `1px solid ${T.amberBdr}`, fontSize: 12, color: "#78350F", lineHeight: 1.55 }}>
              <span style={{ fontWeight: 600 }}>Exception: </span>{p["EXCEPTION"]}
            </div>
          )}
        </div>
        <ChipStrip chips={chips} onSug={onSug} />
      </div>
    );
  }

  // Fallback: plain text
  return (
    <div style={{ maxWidth: "82%", padding: "10px 13px", borderRadius: "15px 15px 15px 4px", fontSize: 13, lineHeight: 1.6, background: T.white, color: T.text, border: `1px solid ${T.bdr}` }}>
      {text}
    </div>
  );
}

// ── BUBBLE ──
function Bubble({ role, text, onSug }) {
  if (role === "user") return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 3 }}>
      <div style={{ maxWidth: "80%", padding: "10px 14px", borderRadius: "16px 16px 4px 16px", fontSize: 14, lineHeight: 1.5, background: T.teal, color: "white" }}>{text}</div>
      <span style={{ fontSize: 10, color: T.muted, paddingRight: 3 }}>Now</span>
    </div>
  );
  if (role === "error") return (
    <div style={{ background: T.amberLt, border: `1px solid ${T.amberBdr}`, borderRadius: 10, padding: "10px 13px", maxWidth: "88%", fontSize: 12, color: "#78350F" }}>
      {text}
    </div>
  );
  const isStructured = ["INTENT: COVERAGE","INTENT: PROCESS","INTENT: DOCUMENTS","INTENT: NOT_COVERED"].some(k => text.includes(k));
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-start", gap: 3 }}>
      {isStructured
        ? <StructuredResp text={text} onSug={onSug} />
        : <div style={{ maxWidth: "82%", padding: "10px 13px", borderRadius: "15px 15px 15px 4px", fontSize: 13, lineHeight: 1.6, background: T.white, color: T.text, border: `1px solid ${T.bdr}` }}>{text}</div>
      }
      <span style={{ fontSize: 10, color: T.muted, paddingLeft: 3 }}>Now</span>
    </div>
  );
}

// ── NAV BAR ──

  const tabs = [
    { id: "home", label: "Home", icon: <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> },
    { id: "inbox", label: "Inbox", icon: <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg> },
    { id: "visits", label: "Visits", icon: <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> },
    { id: "navigator", label: "My Cover", icon: <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg> },
    { id: "account", label: "Account", icon: <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> },
  ];
  return (
    <div style={{ height: 70, background: T.white, borderTop: `1px solid ${T.bdr}`, display: "flex", alignItems: "flex-start", justifyContent: "space-around", padding: "8px 0 0", flexShrink: 0 }}>
      {tabs.map(t => {
        const on = active === t.id;
        return (
          <div key={t.id} onClick={() => onNav(t.id)} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 3, cursor: "pointer", padding: "4px 8px", minWidth: 56, position: "relative" }}>
            <div style={{ color: on ? T.teal : T.text, opacity: on ? 1 : 0.28 }}>{t.icon}</div>
            <span style={{ fontSize: 10, fontWeight: on ? 600 : 500, color: on ? T.teal : T.muted }}>{t.label}</span>
            {t.id === "navigator" && showNew && (
              <>
                <span style={{ position: "absolute", top: 0, right: 2, background: T.coral, color: "white", fontSize: 8, fontWeight: 700, padding: "1px 4px", borderRadius: 5, animation: "pulseBadge 2s ease infinite" }}>NEW</span>
                <div id="navTooltip" style={{ position: "absolute", bottom: 78, right: -8, background: T.text, color: "white", fontSize: 11, fontWeight: 500, padding: "8px 12px", borderRadius: 8, whiteSpace: "nowrap", zIndex: 300, boxShadow: "0 4px 16px rgba(0,0,0,0.2)", animation: "tooltipSlide 0.3s ease", cursor: "pointer" }} onClick={() => onNav("navigator")}>
                  ✦ New: Check what your policy covers
                  <div style={{ position: "absolute", top: "100%", right: 20, borderLeft: "5px solid transparent", borderRight: "5px solid transparent", borderTop: `5px solid ${T.text}` }} />
                </div>
              </>
            )}
          </div>
        );
      })}
    </div>
  );
}

          </div>
        </div>
        <div style={{ color: "rgba(255,255,255,0.7)", fontSize: 13, marginBottom: 14 }}>Good morning, Shantanu 👋</div>
        <div style={{ background: T.tealDk, borderRadius: 16, padding: "13px 14px", display: "flex", alignItems: "center", gap: 11, marginBottom: 16 }}>
          <div style={{ width: 38, height: 38, background: "rgba(255,255,255,0.15)", borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15 }}>👩‍⚕️</div>
          <div style={{ flex: 1 }}>
            <div style={{ color: "white", fontSize: 13, fontWeight: 600 }}>Dr. Priya Menon</div>
            <div style={{ color: "rgba(255,255,255,0.6)", fontSize: 11, marginTop: 1 }}>MBBS, 10+ years · My Advisor</div>
          </div>
          <div style={{ width: 30, height: 30, background: "rgba(255,255,255,0.15)", borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center" }}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          </div>
        </div>
      </div>
      <div style={{ flex: 1, overflowY: "auto", background: T.bg, padding: "14px 14px 16px" }}>
        <div onClick={() => onNav("navigator")} style={{ background: `linear-gradient(135deg, ${T.teal}, ${T.tealDk})`, borderRadius: 16, padding: "14px 16px", display: "flex", alignItems: "center", gap: 10, cursor: "pointer", marginBottom: 14 }}>
          <span style={{ background: T.coral, color: "white", fontSize: 9, fontWeight: 700, padding: "3px 7px", borderRadius: 8, flexShrink: 0 }}>NEW</span>
          <div style={{ flex: 1 }}>
            <div style={{ color: "white", fontSize: 13, fontWeight: 600, marginBottom: 1 }}>Know your coverage instantly</div>
            <div style={{ color: "rgba(255,255,255,0.65)", fontSize: 11 }}>Ask anything about your policy</div>
          </div>
          <span style={{ color: "rgba(255,255,255,0.6)", fontSize: 16 }}>→</span>
        </div>
        <div style={{ fontSize: 12, fontWeight: 600, color: T.text2, marginBottom: 8 }}>Our Offerings</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 9, marginBottom: 14 }}>
          {[

// ── MY COVER SCREEN ──
function NavScreen({ onNav }) {
  const [msgs, setMsgs] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const chatRef = useRef(null);

  useEffect(() => {
    if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
  }, [msgs, loading]);

  const SUGS = [
    "Is knee surgery covered?",
    "How does reimbursement work for fractures?",
    "My father was hospitalised — what do I do?",
    "Is dengue fever covered?",
    "What documents do I need for a claim?",
    "Is root canal covered?",
    "Normal delivery maternity claim",
  ];

  async function send(txt) {
    const t = (txt || input).trim();
    if (!t || loading) return;
    setInput("");
    setMsgs(prev => [...prev, { role: "user", text: t }]);
    setLoading(true);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json","x-api-key": "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","anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: SYSTEM_PROMPT,
          messages: [{ role: "user", content: t }]
        })
      });
      const data = await res.json();
      const reply = data.content[0].text;
      setMsgs(prev => [...prev, { role: "assistant", text: reply }]);
    } catch (e) {
      setMsgs(prev => [...prev, { role: "error", text: "Could not reach the server. Please try again." }]);
    } finally {
      setLoading(false);
    }
  }

  return (
    <div style={{ display: "flex", flexDirection: "column", flex: 1, overflow: "hidden" }}>
      <div style={{ background: T.teal, padding: "14px 20px 16px", flexShrink: 0 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
          <div onClick={() => onNav("home")} style={{ width: 30, height: 30, background: "rgba(255,255,255,0.15)", borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer" }}>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          </div>
          <div>
            <div style={{ color: "white", fontSize: 17, fontWeight: 700 }}>My Cover</div>
            <div style={{ color: "rgba(255,255,255,0.6)", fontSize: 11 }}>AI-powered policy clarity</div>
          </div>
        </div>
        <div style={{ background: "rgba(255,255,255,0.11)", border: "1px solid rgba(255,255,255,0.18)", borderRadius: 12, padding: "10px 13px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{ width: 30, height: 30, background: "rgba(255,255,255,0.15)", borderRadius: 7, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, flexShrink: 0 }}>🏢</div>
            <div style={{ flex: 1 }}>
              <div style={{ color: "white", fontSize: 12, fontWeight: 600 }}>Meesho Technologies — Group Health</div>
              <div style={{ color: "rgba(255,255,255,0.5)", fontSize: 10, marginTop: 1 }}>₹5,00,000 · Self + Spouse + 2 Dependents · Loop corporate policy</div>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 4, background: "rgba(255,255,255,0.12)", borderRadius: 20, padding: "3px 8px", fontSize: 10, fontWeight: 600, color: "#7CDFCF", flexShrink: 0 }}>
              <span style={{ width: 5, height: 5, background: "#7CDFCF", borderRadius: "50%", display: "inline-block" }} />Active
            </div>
          </div>
        </div>
      </div>

      <div ref={chatRef} style={{ flex: 1, overflowY: "auto", background: T.bg, padding: "14px 13px 12px", display: "flex", flexDirection: "column", gap: 12 }}>
        {msgs.length === 0 && (
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-start", gap: 3 }}>
              <div style={{ maxWidth: "84%", padding: "10px 13px", borderRadius: "15px 15px 15px 4px", fontSize: 13, lineHeight: 1.6, background: T.white, color: T.text, border: `1px solid ${T.bdr}` }}>
                Hi! Ask me anything about your policy — what's covered, how to claim, what documents you need, or what to do in any health situation.
                <div style={{ marginTop: 8, fontSize: 11, color: T.muted, fontStyle: "italic" }}>Policy guidance only, not medical advice.</div>
              </div>
              <span style={{ fontSize: 10, color: T.muted, paddingLeft: 3 }}>Now</span>
            </div>
            <div style={{ fontSize: 11, color: T.muted }}>Try asking:</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>
              {SUGS.map(s => (
                <div key={s} onClick={() => send(s)} style={{ background: T.white, border: `1.5px solid ${T.bdr}`, borderRadius: 20, padding: "5px 12px", fontSize: 12, fontWeight: 500, color: T.text, cursor: "pointer", whiteSpace: "nowrap" }}>{s}</div>
              ))}
            </div>
          </div>
        )}
        {msgs.map((m, i) => <Bubble key={i} role={m.role} text={m.text} onSug={send} />)}
        {loading && (
          <div style={{ display: "flex", alignItems: "center", gap: 5, padding: "11px 13px", background: T.white, border: `1px solid ${T.bdr}`, borderRadius: "15px 15px 15px 4px", width: "fit-content" }}>
            {[0, 1, 2].map(i => <div key={i} style={{ width: 6, height: 6, background: T.muted, borderRadius: "50%", animation: `bounce 1.2s ${i * 0.2}s infinite` }} />)}
          </div>
        )}
      </div>

      <div style={{ background: T.white, borderTop: `1px solid ${T.bdr}`, padding: "10px 12px 14px", display: "flex", gap: 8, alignItems: "flex-end", flexShrink: 0 }}>
        <textarea
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }}
          placeholder="Ask about your policy…"
          rows={1}
          style={{ flex: 1, background: T.bg, border: `1.5px solid ${T.bdr}`, borderRadius: 22, padding: "10px 16px", fontSize: 14, fontFamily: "inherit", color: T.text, outline: "none", resize: "none", maxHeight: 80, lineHeight: 1.4 }}
        />
        <div onClick={() => !loading && send()} style={{ width: 40, height: 40, background: loading ? T.bdr : T.teal, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", cursor: loading ? "default" : "pointer", flexShrink: 0 }}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </div>
      </div>
    </div>
  );
}
